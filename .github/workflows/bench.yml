name: Chess

on:
  workflow_dispatch:

jobs:
  bench:
    name: Bench Job
    runs-on: macos-14
    timeout-minutes: 355

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Preparations
        run: |
          brew update
          brew install gcc jq
          _ICCF=0 _NOEDIT=2 _CHESS960=0 sh bin/build.sh
          chmod 0755 adzchess
      
      - name: Execution
        run: |
          GN=3
          USERNAME=antoniudanielzapirtan
          LTG=1500
          PROCESSORS=2
          ulimit -t $LTG
          for n in $(seq 1 $PROCESSORS); do
            fisher=false sh bin/dlpgn.sh $GN >$GN.txt
            ./adzchess go >$GN.2.txt 2>&1 &
            GN=$(($GN + 1))
          done
          wait
          GN=3
          for n in $(seq 1 $PROCESSORS); do
            cat $GN.txt
            cat $GN.2.txt | tail -n 3
            GN=$(($GN + 1))
          done

